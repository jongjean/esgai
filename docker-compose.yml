version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - esgai_net

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: engine
    depends_on:
      - redis
    ports:
      - "4610:4610"
    networks:
      - esgai_net
    volumes:
      - ./engine:/app
      - ./web/downloads:/app/master_downloads
      - /var/www/esgai/downloads:/app/deploy_downloads
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1

  worker:
    build:
      context: ./engine
      dockerfile: Dockerfile
    command: python worker.py
    depends_on:
      - redis
    networks:
      - esgai_net
    volumes:
      - ./engine:/app
      - ./web/downloads:/app/master_downloads
      - /var/www/esgai/downloads:/app/deploy_downloads
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    deploy:
      replicas: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web
    depends_on:
      - engine
    ports:
      - "4600:4600"
    networks:
      - esgai_net
    volumes:
      - ./web:/app
      - ./web/downloads:/app/master_downloads
      - /var/www/esgai/downloads:/app/deploy_downloads
    env_file: .env
    environment:
      - ENGINE_URL=http://engine:4610

networks:
  esgai_net:
    driver: bridge
